name: Build
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.23"

      - name: Sync
        run: uv sync

      - name: Build
        run: uv run build

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/quill-template-python-bundle.zip # update accordingly
